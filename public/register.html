<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — ParkHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Custom Cursor -->
  <div class="cursor"></div>
  <div class="cursor-light"></div>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">
        <span class="nav-brand-icon">◆</span>
        ParkHub
      </a>
        <button type="button" class="btn-icon btn" id="theme-btn" title="Toggle theme">🌙</button>
    </div>
  </nav>

  <div class="page-sm">
    <div class="card auth-card">
      <div class="auth-logo">✚</div>
      <h1 style="font-size:1.5rem;font-weight:700;letter-spacing:-.2px;margin-bottom:6px;font-family:'Cormorant Garamond',serif">Join ParkHub</h1>
      <p class="text-sm text-muted mb-6">Create your account and start parking with elegance</p>

      <div id="error" class="alert alert-error" style="display:none"></div>

      <form id="form">
        <div class="form-group">
          <label class="label" for="username">Username</label>
          <input class="input" type="text" id="username" placeholder="john_doe" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="label" for="email">Email Address</label>
          <input class="input" type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="label" for="password">Password</label>
          <input class="input" type="password" id="password" placeholder="Min. 6 characters" required autocomplete="new-password" />
          <p class="form-hint">Use a strong password with letters and numbers</p>
        </div>
        <div class="form-group">
          <label class="label" for="phone">Phone Number <span style="font-weight:400;text-transform:none">(Optional)</span></label>
          <input class="input" type="tel" id="phone" placeholder="9876543210" autocomplete="tel" />
        </div>
        <button class="btn btn-primary btn-full" style="margin-top:12px" type="submit" id="btn">Create account</button>
      </form>

      <p class="text-sm text-muted text-center mt-4">
        Already have an account? <a href="login.html" style="font-weight:600;color:var(--primary)">Sign in</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { authAPI } from './api.js';

    // Custom Cursor
    const cursor = document.querySelector('.cursor');
    const cursorLight = document.querySelector('.cursor-light');
    let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animateCursor() {
      cursorX += (mouseX - cursorX) * 0.12;
      cursorY += (mouseY - cursorY) * 0.12;
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      cursorLight.style.left = cursorX - 18 + 'px';
      cursorLight.style.top = cursorY - 18 + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    document.addEventListener('mouseover', (e) => {
      if (e.target.matches('a, button, input')) cursorLight.style.opacity = '1';
    });
    document.addEventListener('mouseout', (e) => {
      if (e.target.matches('a, button, input')) cursorLight.style.opacity = '0';
    });

    // Theme
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.dataset.theme = saved;
    const themeBtn = document.getElementById('theme-btn');
    if (themeBtn) {
      themeBtn.textContent = saved === 'dark' ? '☀️' : '🌙';
      themeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const current = document.documentElement.dataset.theme;
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        localStorage.setItem('theme', next);
        themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
      });
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('error');
      err.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        await authAPI.register(
          document.getElementById('username').value,
          document.getElementById('email').value,
          document.getElementById('password').value,
          document.getElementById('phone').value
        );
        window.location.href = 'login.html';
      } catch (e) {
        err.textContent = e.message; err.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
